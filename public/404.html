<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect hack
      // Saves the full URL to sessionStorage and redirects to the root
      // so the React app can restore the correct route on load.
      const path =
        window.location.pathname + window.location.search + window.location.hash
      sessionStorage.setItem('spa_redirect', path)
      window.location.replace('/')
    </script>
  </head>
  <body></body>
</html>
